<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Sidebar Blocker</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <img src="icons/icon48.png" alt="icon" class="logo" />
        <h1>YT Sidebar Blocker</h1>
      </div>

      <p class="description">
        Hide the recommended videos sidebar on YouTube watch pages.
      </p>

      <div class="toggle-row">
        <span class="toggle-label" id="status-label">Enabled</span>
        <label class="switch">
          <input type="checkbox" id="toggle" checked />
          <span class="slider"></span>
        </label>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
